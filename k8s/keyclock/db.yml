apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
spec:
  ports:
    - port: 5432
  selector:
    app: keycloak-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-db
spec:
  serviceName: "keycloak-db"
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-db
  template:
    metadata:
      labels:
        app: keycloak-db
    spec:
      nodeSelector:
        node-role: user-worker
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: keycloak
            - name: POSTGRES_USER
              value: keycloak
            - name: POSTGRES_PASSWORD
              value: password123
          ports:
            - containerPort: 5432